<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的导航页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f7f9fc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ---------- 搜索框 ---------- */
        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 32px;
            margin-top: 8px;
        }

        .search-box {
            display: flex;
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            border: 1px solid #e2e8f0;
            transition: box-shadow 0.2s;
        }

        .search-box:focus-within {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.10);
            border-color: #b0c4de;
        }

        .search-box input {
            flex: 1;
            border: none;
            padding: 14px 20px;
            font-size: 1rem;
            outline: none;
            background: transparent;
            color: #1e293b;
        }

        .search-box input::placeholder {
            color: #94a3b8;
        }

        .search-box button {
            background: #eef2f6;
            border: none;
            padding: 0 24px;
            font-size: 1rem;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-box button:hover {
            background: #dce1e8;
        }

        /* ---------- 卡片网格 ---------- */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            max-width: 1280px;
            width: 100%;
        }

        .card {
            border-radius: 20px;
            padding: 20px 16px 16px;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06), 0 2px 8px rgba(0, 0, 0, 0.03);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.08), 0 4px 12px rgba(0, 0, 0, 0.04);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            padding-bottom: 12px;
            margin-bottom: 12px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.06);
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }

        .card-body {
            flex: 1;
            display: flex;
            align-items: stretch;
            position: relative;
            min-height: 0;
        }

        .col {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 4px 0;
        }

        .col-left {
            padding-right: 8px;
        }
        .col-right {
            padding-left: 8px;
        }

        .link-item {
            margin: 3px 0;
        }

        .link-item a {
            display: block;
            color: #2d3748;
            text-decoration: none;
            font-size: 0.9rem;
            padding: 6px 8px;
            border-radius: 10px;
            transition: background 0.2s ease, color 0.2s ease;
            word-break: break-word;
            font-weight: 450;
            letter-spacing: 0.2px;
        }

        .link-item a:hover {
            background: rgba(255, 255, 255, 0.7);
            color: #1a202c;
        }

        .divider-line {
            width: 1.5px;
            background: rgba(0, 0, 0, 0.10);
            flex-shrink: 0;
            margin: 12px 0;
            border-radius: 2px;
        }

        /* ---------- 配色 (通过JS动态添加, 此处保留样式类) ---------- */
        .card-1 { background: #e6f2ff; }
        .card-1 .card-title { color: #1a4b8c; }

        .card-2 { background: #e6f7e6; }
        .card-2 .card-title { color: #1e6b3b; }

        .card-3 { background: #f0e6ff; }
        .card-3 .card-title { color: #5a3d8a; }

        .card-4 { background: #ffe6f0; }
        .card-4 .card-title { color: #8f3b5e; }

        .card-5 { background: #fff0e0; }
        .card-5 .card-title { color: #8f5a2a; }

        .card-6 { background: #e0f7fa; }
        .card-6 .card-title { color: #1f6b7a; }

        .card-7 { background: #fffde0; }
        .card-7 .card-title { color: #7a6b1a; }

        .card-8 { background: #e8ecf1; }
        .card-8 .card-title { color: #3a4a5e; }

        /* ---------- 响应式 ---------- */
        @media (max-width: 1024px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
        }

        @media (max-width: 640px) {
            body { padding: 16px; }
            .grid { grid-template-columns: 1fr 1fr; gap: 14px; }
            .card { padding: 14px 12px 12px; border-radius: 16px; }
            .card-title { font-size: 0.95rem; padding-bottom: 8px; margin-bottom: 8px; }
            .link-item a { font-size: 0.75rem; padding: 4px 6px; border-radius: 6px; }
            .divider-line { margin: 8px 0; }
            .col-left { padding-right: 4px; }
            .col-right { padding-left: 4px; }
            .search-box input { font-size: 0.9rem; padding: 12px 16px; }
            .search-box button { padding: 0 16px; font-size: 0.9rem; }
        }

        @media (max-width: 420px) {
            .grid { grid-template-columns: 1fr; gap: 16px; }
            .card { aspect-ratio: auto; min-height: 200px; }
        }
    </style>
</head>
<body>
    <!-- ====== 搜索框 ====== -->
    <div class="search-container">
        <form class="search-box" action="https://www.google.com/search" target="_blank" method="GET">
            <input type="text" name="q" placeholder="搜索 Google ..." />
            <button type="submit">搜索</button>
        </form>
    </div>

    <!-- ====== 卡片容器 ====== -->
    <div class="grid" id="cardGrid"></div>

    <!-- ====== 引入数据并渲染 ====== -->
    <script src="config.js"></script>
    <script>
        // 数据由 config.js 提供，全局变量 siteData
        (function() {
            const grid = document.getElementById('cardGrid');
            if (!grid) return;

            // 预设颜色类列表（按顺序循环）
            const colorClasses = ['card-1', 'card-2', 'card-3', 'card-4', 'card-5', 'card-6', 'card-7', 'card-8'];

            // 清空网格（防止重复加载）
            grid.innerHTML = '';

            // 遍历数据生成卡片
            siteData.forEach((category, index) => {
                // 取颜色类（循环使用）
                const colorClass = colorClasses[index % colorClasses.length];

                // 分割链接到左右列（每列最多5个，均匀分配）
                const links = category.links;
                const half = Math.ceil(links.length / 2);
                const leftLinks = links.slice(0, half);
                const rightLinks = links.slice(half);

                // 辅助生成链接列表HTML
                function renderLinkList(linkArray) {
                    return linkArray.map(link => 
                        `<div class="link-item"><a href="${link.url}" target="_blank">${link.name}</a></div>`
                    ).join('');
                }

                // 如果某列不足5个，用不可见占位补齐（保持对称）
                function padWithPlaceholders(html, count) {
                    const existing = html.match(/<div class="link-item"/g)?.length || 0;
                    let result = html;
                    for (let i = existing; i < 5; i++) {
                        result += `<div class="link-item" style="visibility:hidden;">占位</div>`;
                    }
                    return result;
                }

                let leftHtml = renderLinkList(leftLinks);
                let rightHtml = renderLinkList(rightLinks);
                leftHtml = padWithPlaceholders(leftHtml, 5);
                rightHtml = padWithPlaceholders(rightHtml, 5);

                // 构建卡片HTML
                const cardHTML = `
                    <div class="card ${colorClass}">
                        <div class="card-title">${category.icon || '📁'} ${category.name}</div>
                        <div class="card-body">
                            <div class="col col-left">${leftHtml}</div>
                            <div class="divider-line"></div>
                            <div class="col col-right">${rightHtml}</div>
                        </div>
                    </div>
                `;

                grid.insertAdjacentHTML('beforeend', cardHTML);
            });
        })();
    </script>
</body>
</html>
