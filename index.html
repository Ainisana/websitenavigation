

        <div class="categories" id="categories">
            <!-- 分类将通过JavaScript动态生成 -->
        </div>

        <div class="footer">
            <p>© 2025 快捷链接导航 | 让访问更便捷</p>
        </div>
    </div>

    <!-- 引入配置文件 -->
    <script src="config.js"></script>
    <script>
        // 如果没有加载到配置文件，使用默认配置
        if (typeof linksConfig === 'undefined') {
            const linksConfig = {
                "全屏钱包": {
                    icon: "💰",
                    links: [
                        { title: "OKX钱包", url: "chrome-extension://mcohilncbfahbmgdjkbpemcciiolgcge/home.html", icon: "🔶" },
                        { title: "MetaMask钱包", url: "chrome-extension://nkbihfbeogaeaoehlefnkodbefgpgknn/home.html", icon: "🦊" },
                        { title: "Phantom钱包", url: "chrome-extension://bfnaelmomeimhlpmgjnjophhpkkoljpa/popup.html", icon: "👻" }
                    ]
                },
                "Chrome设置": {
                    icon: "⚙️",
                    links: [
                        { title: "扩展管理", url: "chrome://extensions/", icon: "🧩" },
                        { title: "历史记录", url: "chrome://history/", icon: "📚" },
                        { title: "书签管理", url: "chrome://bookmarks/", icon: "🔖" },
                        { title: "清除缓存", url: "chrome://settings/privacy", icon: "🧹" },
                        { title: "设置语言", url: "chrome://settings/languages", icon: "🌐" },
                        { title: "网页缩放", url: "chrome://settings/appearance", icon: "🔍" },
                        { title: "APP管理", url: "chrome://apps/", icon: "📱" },
                        { title: "查看版本", url: "chrome://version/", icon: "ℹ️" }
                    ]
                },
                "开发工具": {
                    icon: "🛠️",
                    links: [
                        { title: "GitHub", url: "https://github.com", icon: "🐱" },
                        { title: "Stack Overflow", url: "https://stackoverflow.com", icon: "📚" },
                        { title: "MDN Web Docs", url: "https://developer.mozilla.org", icon: "📖" },
                        { title: "Can I Use", url: "https://caniuse.com", icon: "✅" },
                        { title: "CodePen", url: "https://codepen.io", icon: "🖊️" }
                    ]
                },
                "常用网站": {
                    icon: "🌐",
                    links: [
                        { title: "Google", url: "https://google.com", icon: "🔍" },
                        { title: "百度", url: "https://baidu.com", icon: "🔍" },
                        { title: "腾讯邮箱", url: "https://mail.qq.com", icon: "📧" },
                        { title: "网易邮箱", url: "https://mail.163.com", icon: "📧" },
                        { title: "微博", url: "https://weibo.com", icon: "🐦" }
                    ]
                }
            };
            window.linksConfig = linksConfig;
        }

        // 应用网站配置
        function applySiteConfig() {
            if (typeof siteConfig !== 'undefined') {
                document.querySelector('.header h1').textContent = siteConfig.title;
                document.querySelector('.header p').textContent = siteConfig.subtitle;
                document.querySelector('.footer p').textContent = siteConfig.footer;
                document.querySelector('.search-input').placeholder = siteConfig.searchPlaceholder;
                
                // 应用主题色彩
                if (siteConfig.theme) {
                    document.documentElement.style.setProperty('--primary-color', siteConfig.theme.primaryColor);
                    document.documentElement.style.setProperty('--secondary-color', siteConfig.theme.secondaryColor);
                }
            }
        }

        // 生成分类和链接
        function generateCategories() {
            const categoriesContainer = document.getElementById('categories');
            categoriesContainer.innerHTML = '';
            
            const configToUse = window.linksConfig || linksConfig;
            Object.keys(configToUse).forEach(categoryName => {
                const categoryData = configToUse[categoryName];
                
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category';
                categoryDiv.setAttribute('data-category', categoryName);

                const categoryTitle = document.createElement('div');
                categoryTitle.className = 'category-title';
                categoryTitle.innerHTML = `<span class="category-icon">${categoryData.icon}</span>${categoryName}`;

                const linksDiv = document.createElement('div');
                linksDiv.className = 'links';

                categoryData.links.forEach(link => {
                    const linkElement = document.createElement('div');
                    linkElement.className = 'link-item';
                    linkElement.setAttribute('data-title', link.title.toLowerCase());
                    linkElement.setAttribute('data-url', link.url);
                    
                    // 截断URL显示
                    const displayUrl = link.url.length > 35 ? link.url.substring(0, 35) + '...' : link.url;
                    
                    linkElement.innerHTML = `
                        <span class="link-icon">${link.icon}</span>
                        <div class="link-content">
                            <div class="link-title" title="${link.title}">${link.title}</div>
                            <div class="link-url" title="${link.url}">${displayUrl}</div>
                        </div>
                        <button class="copy-btn" onclick="copyText(this)">复制</button>
                    `;
                    
                    linksDiv.appendChild(linkElement);
                });

                categoryDiv.appendChild(categoryTitle);
                categoryDiv.appendChild(linksDiv);
                categoriesContainer.appendChild(categoryDiv);
            });
        }

        // 搜索功能
        function setupSearch() {
            const searchInput = document.querySelector('.search-input');
            
            searchInput.addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase();
                const categories = document.querySelectorAll('.category');
                
                categories.forEach(category => {
                    const links = category.querySelectorAll('.link-item');
                    let hasVisibleLinks = false;
                    
                    links.forEach(link => {
                        const title = link.getAttribute('data-title');
                        if (title.includes(searchTerm)) {
                            link.classList.remove('hidden');
                            hasVisibleLinks = true;
                        } else {
                            link.classList.add('hidden');
                        }
                    });
                    
                    if (hasVisibleLinks || searchTerm === '') {
                        category.classList.remove('hidden');
                    } else {
                        category.classList.add('hidden');
                    }
                });
            });
        }

        // 键盘快捷键
        function setupKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                // Ctrl/Cmd + K 聚焦搜索框
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    document.querySelector('.search-input').focus();
                }
                
                // ESC 清空搜索
                if (e.key === 'Escape') {
                    const searchInput = document.querySelector('.search-input');
                    searchInput.value = '';
                    searchInput.dispatchEvent(new Event('input'));
                    searchInput.blur();
                }
            });
        }

        // 复制链接功能
        function copyText(button) {
            const linkItem = button.closest('.link-item');
            const link = linkItem.getAttribute('data-url');
            
            navigator.clipboard.writeText(link).then(() => {
                button.classList.add('copied');
                const originalText = button.textContent;
                button.textContent = "已复制";
                
                setTimeout(() => {
                    button.classList.remove('copied');
                    button.textContent = originalText;
                }, 2000);
            }).catch(err => {
                console.error('复制失败:', err);
                button.textContent = "失败";
                setTimeout(() => button.textContent = "复制", 1500);
            });
        }

        // 使复制函数全局可用
        window.copyText = copyText;

        // 添加右键菜单复制功能
        function setupContextMenu() {
            document.addEventListener('contextmenu', (e) => {
                const linkItem = e.target.closest('.link-item');
                if (linkItem) {
                    e.preventDefault();
                    const copyBtn = linkItem.querySelector('.copy-btn');
                    if (copyBtn) {
                        copyText(copyBtn);
                    }
                }
            });
        }

        // 添加键盘复制功能
        function setupKeyboardCopy() {
            document.addEventListener('keydown', (e) => {
                // Ctrl/Cmd + C 在悬停的链接项上
                if ((e.ctrlKey || e.metaKey) && e.key === 'c') {
                    const hoveredItem = document.querySelector('.link-item:hover');
                    if (hoveredItem) {
                        e.preventDefault();
                        const copyBtn = hoveredItem.querySelector('.copy-btn');
                        if (copyBtn) {
                            copyText(copyBtn);
                        }
                    }
                }
            });
        }

        // 添加导出功能
        function exportConfig() {
            const configToExport = {
                linksConfig: window.linksConfig || linksConfig,
                siteConfig: window.siteConfig || {}
            };
            
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(configToExport, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "config.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        // 添加管理员快捷键
        function setupAdminShortcuts() {
            document.addEventListener('keydown', (e) => {
                // Alt + E 导出配置
                if (e.altKey && e.key === 'e') {
                    e.preventDefault();
                    exportConfig();
                }
            });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            applySiteConfig();
            generateCategories();
            setupSearch();
            setupKeyboardShortcuts();
            setupAdminShortcuts();
            setupContextMenu();
            setupKeyboardCopy();
        });

        // 点击统计（可选）
        document.addEventListener('click', (e) => {
            if (e.target.closest('.copy-btn')) {
                const linkItem = e.target.closest('.link-item');
                const linkTitle = linkItem.querySelector('.link-title').textContent;
                console.log(`Copied: ${linkTitle}`);
                // 这里可以添加统计代码
            }
        });
    </script>
</body>
</html>
